<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
      .actor-box { fill: #A9D6E5; stroke: #2E86AB; stroke-width: 2; }
      .actor-text { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
      .lifeline { stroke: #999; stroke-width: 1; stroke-dasharray: 5,5; }
      .arrow-request { stroke: #2E86AB; stroke-width: 2; fill: none; marker-end: url(#arrowhead-blue); }
      .arrow-response { stroke: #E63946; stroke-width: 2; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead-red); }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #333; text-anchor: middle; }
      .label-small { font-family: Arial, sans-serif; font-size: 10px; fill: #666; text-anchor: middle; font-style: italic; }
      .phase-box { fill: #FFE5B4; stroke: #FF9800; stroke-width: 1; opacity: 0.7; }
      .phase-text { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; fill: #333; }
      .action-box { fill: #90EE90; stroke: #4CAF50; stroke-width: 1; opacity: 0.5; }
      .legend-text { font-family: Arial, sans-serif; font-size: 11px; fill: #333; }
      .legend-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #333; }
    </style>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2E86AB" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#E63946" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="600" y="40" class="title" text-anchor="middle">ANP/AP2 智能体支付协议流程</text>
  
  <!-- Actors -->
  <rect x="50" y="70" width="120" height="60" rx="10" class="actor-box"/>
  <text x="110" y="105" class="actor-text">用户</text>
  
  <rect x="270" y="70" width="120" height="60" rx="10" class="actor-box"/>
  <text x="330" y="95" class="actor-text">购物者智能体</text>
  <text x="330" y="115" class="actor-text">(SA)</text>
  
  <rect x="540" y="70" width="120" height="60" rx="10" class="actor-box"/>
  <text x="600" y="95" class="actor-text">商户智能体</text>
  <text x="600" y="115" class="actor-text">(MA)</text>
  
  <rect x="810" y="70" width="120" height="60" rx="10" class="actor-box"/>
  <text x="870" y="95" class="actor-text">支付处理方</text>
  <text x="870" y="115" class="actor-text">(PP)</text>
  
  <!-- Lifelines -->
  <line x1="110" y1="130" x2="110" y2="820" class="lifeline"/>
  <line x1="330" y1="130" x2="330" y2="820" class="lifeline"/>
  <line x1="600" y1="130" x2="600" y2="820" class="lifeline"/>
  <line x1="870" y1="130" x2="870" y2="820" class="lifeline"/>
  
  <!-- Phase 1: Cart Creation -->
  <rect x="10" y="160" width="100" height="50" rx="5" class="phase-box"/>
  <text x="60" y="180" class="phase-text" text-anchor="middle">阶段1:</text>
  <text x="60" y="195" class="phase-text" text-anchor="middle">购物车创建</text>
  
  <!-- Step 1: User request -->
  <line x1="110" y1="180" x2="330" y2="180" class="arrow-request"/>
  <text x="220" y="170" class="label">1. 发起购买请求</text>
  
  <!-- Step 2: create_cart_mandate -->
  <line x1="330" y1="220" x2="600" y2="220" class="arrow-request"/>
  <text x="465" y="210" class="label">2. create_cart_mandate</text>
  
  <!-- Step 3: Return CartMandate -->
  <line x1="600" y1="260" x2="330" y2="260" class="arrow-response"/>
  <text x="465" y="250" class="label">3. CartMandate + 二维码</text>
  <text x="465" y="275" class="label-small">(merchant_authorization签名)</text>
  
  <!-- Phase 2: User Authorization -->
  <rect x="10" y="300" width="100" height="50" rx="5" style="fill: #D4F1F4; stroke: #00BCD4; stroke-width: 1; opacity: 0.7;"/>
  <text x="60" y="320" class="phase-text" text-anchor="middle">阶段2:</text>
  <text x="60" y="335" class="phase-text" text-anchor="middle">用户授权</text>
  
  <!-- Step 4: Show QR code -->
  <line x1="330" y1="320" x2="110" y2="320" class="arrow-response"/>
  <text x="220" y="310" class="label">4. 展示订单+二维码</text>
  
  <!-- Step 5: User scan and pay -->
  <rect x="50" y="350" width="120" height="40" rx="5" class="action-box"/>
  <text x="110" y="365" class="label" text-anchor="middle">5. 扫码支付</text>
  <text x="110" y="380" class="label" text-anchor="middle">(支付宝/微信)</text>
  
  <!-- Phase 3: Payment Processing -->
  <rect x="10" y="420" width="100" height="50" rx="5" style="fill: #FFD6E8; stroke: #E91E63; stroke-width: 1; opacity: 0.7;"/>
  <text x="60" y="440" class="phase-text" text-anchor="middle">阶段3:</text>
  <text x="60" y="455" class="phase-text" text-anchor="middle">支付处理</text>
  
  <!-- Step 6: send_payment_mandate -->
  <line x1="330" y1="440" x2="600" y2="440" class="arrow-request"/>
  <text x="465" y="430" class="label">6. send_payment_mandate</text>
  <text x="465" y="455" class="label-small">(user_authorization签名)</text>
  
  <!-- Step 7: Verify payment -->
  <line x1="600" y1="490" x2="870" y2="490" class="arrow-request"/>
  <text x="735" y="480" class="label">7. 验证支付</text>
  
  <!-- Step 8: Payment result -->
  <line x1="870" y1="530" x2="600" y2="530" class="arrow-response"/>
  <text x="735" y="520" class="label">8. 支付结果</text>
  
  <!-- Step 9: Return success -->
  <line x1="600" y1="570" x2="330" y2="570" class="arrow-response"/>
  <text x="465" y="560" class="label">9. 交易成功</text>
  
  <!-- Step 10: Notify user -->
  <line x1="330" y1="610" x2="110" y2="610" class="arrow-response"/>
  <text x="220" y="600" class="label">10. 通知用户</text>
  
  <!-- Legend: Key Features -->
  <text x="50" y="680" class="legend-title">核心特性:</text>
  <text x="50" y="700" class="legend-text">• DID:WBA 去中心化身份</text>
  <text x="50" y="720" class="legend-text">• JWT/JWS 密码学签名</text>
  <text x="50" y="740" class="legend-text">• 二维码支付(支付宝/微信)</text>
  <text x="50" y="760" class="legend-text">• cart_hash 防篡改</text>
  <text x="50" y="780" class="legend-text">• 用户明确授权</text>
  
  <!-- Legend: Arrow Types -->
  <text x="700" y="680" class="legend-title">图例:</text>
  <line x1="700" y1="695" x2="780" y2="695" class="arrow-request"/>
  <text x="790" y="700" class="legend-text">请求</text>
  <line x1="700" y1="715" x2="780" y2="715" class="arrow-response"/>
  <text x="790" y="720" class="legend-text">响应</text>
  
  <!-- Security Features Box -->
  <rect x="700" y="740" width="450" height="120" rx="5" style="fill: #FFF9E6; stroke: #FFA726; stroke-width: 1;"/>
  <text x="720" y="760" class="legend-title">安全机制:</text>
  <text x="720" y="780" class="legend-text">• cart_hash = SHA-256(JCS(contents)) - 确保购物车内容不被篡改</text>
  <text x="720" y="800" class="legend-text">• merchant_authorization (RS256/ES256K) - 商户认证</text>
  <text x="720" y="820" class="legend-text">• user_authorization - 用户明确授权证明</text>
  <text x="720" y="840" class="legend-text">• jti 全局唯一标识符 - 防重放攻击</text>
</svg>