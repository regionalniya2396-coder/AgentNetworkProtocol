<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="800" xmlns="http://www.w3.org/2000/svg">
    <!-- 定义渐变和样式 -->
    <defs>
        <!-- 主动发现背景渐变 -->
        <linearGradient id="activeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b2ebf2;stop-opacity:1" />
        </linearGradient>
        
        <!-- 组件渐变 -->
        <linearGradient id="componentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
        </linearGradient>
        
        <!-- 箭头定义 -->
        <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L10,3.5 L0,7 Z" fill="#007bff" />
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L10,3.5 L0,7 Z" fill="#28a745" />
        </marker>

        <!-- 文本样式 -->
        <style type="text/css">
            .title { font: bold 24px sans-serif; fill: #212529; }
            .subtitle { font: bold 18px sans-serif; fill: #343a40; }
            .label { font: 14px sans-serif; fill: #495057; }
            .arrow-label { font: 12px sans-serif; fill: #007bff; font-weight: bold; }
            .small-label { font: 10px sans-serif; fill: #6c757d; }
            .box-text { font: 14px sans-serif; fill: #212529; text-anchor: middle; }
            .icon-text { font: 12px sans-serif; fill: #212529; text-anchor: middle; }
            .rfc-text { font: 10px sans-serif; fill: #6c757d; text-anchor: middle; }
            .description-text { font: 12px sans-serif; fill: #495057; }
        </style>
    </defs>

    <!-- 背景 -->
    <rect x="0" y="0" width="900" height="800" fill="url(#activeGradient)" />

    <!-- 主标题 -->
    <text x="450" y="50" class="title" text-anchor="middle">ANP 主动发现机制 (ANP Active Discovery Mechanism)</text>

    <!-- 流程图容器 -->
    <rect x="50" y="80" width="800" height="500" rx="15" ry="15" fill="rgba(255,255,255,0.8)" stroke="#007bff" stroke-width="2" />

    <!-- 搜索引擎/智能体 -->
    <rect x="100" y="150" width="180" height="100" rx="10" ry="10" fill="url(#componentGradient)" stroke="#007bff" stroke-width="1.5" />
    <path d="M180 170 L190 180 L180 190 L170 180 Z M185 175 L185 185 M175 185 L185 185 M175 175 L185 175" fill="none" stroke="#007bff" stroke-width="2"/>
    <circle cx="180" cy="180" r="20" fill="none" stroke="#007bff" stroke-width="2"/>
    <line x1="180" y1="195" x2="180" y2="205" stroke="#007bff" stroke-width="2"/>
    <text x="190" y="215" class="box-text">搜索引擎/智能体</text>
    <text x="190" y="235" class="small-label">Search Engine/Agent</text>

    <!-- 智能体服务器 -->
    <rect x="620" y="150" width="180" height="100" rx="10" ry="10" fill="url(#componentGradient)" stroke="#28a745" stroke-width="1.5" />
    <rect x="680" y="170" width="40" height="30" fill="#28a745"/>
    <rect x="680" y="205" width="40" height="5" fill="#28a745"/>
    <text x="710" y="215" class="box-text">智能体服务器</text>
    <text x="710" y="235" class="small-label">Agent Server</text>

    <!-- HTTP GET 请求 -->
    <line x1="280" y1="200" x2="620" y2="200" stroke="#007bff" stroke-width="2" marker-end="url(#arrowBlue)" />
    <text x="450" y="190" class="arrow-label">HTTP GET</text>

    <!-- 提供/返回 -->
    <line x1="710" y1="250" x2="710" y2="320" stroke="#28a745" stroke-width="2" marker-end="url(#arrowGreen)" />
    <text x="710" y="285" class="arrow-label" text-anchor="middle">提供/返回</text>

    <!-- 多个智能体描述文档 -->
    <g id="agent-description-documents">
        <rect x="100" y="320" width="200" height="100" rx="10" ry="10" fill="url(#componentGradient)" stroke="#007bff" stroke-width="1.5" />
        <path d="M120 340 L130 340 L130 350 L120 350 Z M125 345 L125 360" fill="none" stroke="#007bff" stroke-width="2"/>
        <text x="200" y="360" class="box-text">智能体描述文档 1</text>
        <text x="200" y="380" class="small-label">ad1.json</text>

        <rect x="110" y="310" width="200" height="100" rx="10" ry="10" fill="url(#componentGradient)" stroke="#007bff" stroke-width="1.5" opacity="0.7" />
        <path d="M130 330 L140 330 L140 340 L130 340 Z M135 335 L135 350" fill="none" stroke="#007bff" stroke-width="2" opacity="0.7"/>
        <text x="210" y="350" class="box-text" opacity="0.7">智能体描述文档 2</text>
        <text x="210" y="370" class="small-label" opacity="0.7">ad2.json</text>

        <rect x="120" y="300" width="200" height="100" rx="10" ry="10" fill="url(#componentGradient)" stroke="#007bff" stroke-width="1.5" opacity="0.5" />
        <path d="M140 320 L150 320 L150 330 L140 330 Z M145 325 L145 340" fill="none" stroke="#007bff" stroke-width="2" opacity="0.5"/>
        <text x="220" y="340" class="box-text" opacity="0.5">...</text>
    </g>

    <!-- .well-known/agent-descriptions (CollectionPage) -->
    <rect x="580" y="320" width="260" height="100" rx="10" ry="10" fill="url(#componentGradient)" stroke="#9c27b0" stroke-width="1.5" />
    <path d="M600 340 L610 340 L610 350 L600 350 Z M605 345 L605 360" fill="none" stroke="#9c27b0" stroke-width="2"/>
    <text x="710" y="360" class="box-text">/.well-known/</text>
    <text x="710" y="380" class="box-text">agent-descriptions</text>
    <text x="710" y="400" class="rfc-text">RFC 8615</text>

    <!-- 从 CollectionPage 到 多个文档的连接 -->
    <line x1="580" y1="370" x2="300" y2="370" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrowBlue)" />
    <text x="440" y="360" class="arrow-label" text-anchor="middle">包含 URL 列表</text>

    <!-- 底部说明 -->
    <rect x="50" y="600" width="800" height="180" rx="15" ry="15" fill="rgba(255,255,255,0.8)" stroke="#007bff" stroke-width="2" />
    <text x="70" y="630" class="subtitle">说明:</text>
    <text x="70" y="660" class="description-text">・主动发现: 通过访问 .well-known URI 路径发现域名下所有公开智能体</text>
    <text x="70" y="690" class="description-text">・返回格式: JSON-LD CollectionPage, 包含智能体描述文档 URL 列表</text>
    <text x="70" y="720" class="description-text">・图形表示: /.well-known/agent-descriptions (CollectionPage) 指向多个智能体描述文档</text>
    <text x="70" y="750" class="description-text">・调整: 箭头文字位置已优化，避免覆盖。</text>

</svg>